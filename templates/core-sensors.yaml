template:

  ############################################################
  #
  # Live Power
  #
  ############################################################

  - sensor:

      - name: "HAES PV Power"
        unique_id: haes_pv_power
        icon: mdi:solar-power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.YOUR_PV_POWER') | float(0) }}"

      - name: "HAES House Power"
        unique_id: haes_house_power
        icon: mdi:home-lightning-bolt
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.YOUR_HOUSE_POWER') | float(0) }}"

      - name: "HAES Grid Power"
        unique_id: haes_grid_power
        icon: mdi:transmission-tower
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.YOUR_GRID_POWER') | float(0) }}"

      - name: "HAES Battery Power"
        unique_id: haes_battery_power
        icon: mdi:battery-charging
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.YOUR_BATTERY_POWER') | float(0) }}"

  ############################################################
  #
  # Production
  #
  ############################################################

  - sensor:

      - name: "HAES Production - Today"
        unique_id: haes_production_today
        icon: mdi:solar-power-variant
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: "{{ states('sensor.YOUR_PRODUCTION_TODAY') | float(0) }}"

      - name: "HAES Production - Total"
        unique_id: haes_production_total
        icon: mdi:solar-panel-large
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: "{{ states('sensor.YOUR_PRODUCTION_TOTAL') | float(0) }}"

  ############################################################
  #
  # Grid
  #
  ############################################################

  - sensor:

      - name: "HAES Grid Import - Today"
        unique_id: haes_grid_import_today
        icon: mdi:transmission-tower-import
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: "{{ states('sensor.YOUR_GRID_IMPORT_TODAY') | float(0) }}"

      - name: "HAES Grid Export - Today"
        unique_id: haes_grid_export_today
        icon: mdi:transmission-tower-export
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: "{{ states('sensor.YOUR_GRID_EXPORT_TODAY') | float(0) }}"

  ############################################################
  #
  # Battery
  #
  ############################################################

  - sensor:

      - name: "HAES Battery - SOC"
        unique_id: haes_battery_soc
        icon: mdi:battery
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: "{{ states('sensor.YOUR_BATTERY_SOC') | float(0) }}"

      - name: "HAES Battery - Status"
        unique_id: haes_battery_status
        icon: mdi:battery-sync
        state: >
          {% set p = states('sensor.haes_battery_power') | float(0) %}
          {% if p > 50 %}
            Charging
          {% elif p < -50 %}
            Discharging
          {% else %}
            Idle
          {% endif %}

  ############################################################
  #
  # Consumption
  #
  ############################################################

  - sensor:

      - name: "HAES Consumption - Today"
        unique_id: haes_consumption_today
        icon: mdi:home-lightning-bolt-outline
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >
          {{
            (
              states('sensor.haes_production_today') | float(0)
              + states('sensor.haes_grid_import_today') | float(0)
              - states('sensor.haes_grid_export_today') | float(0)
            ) | round(3)
          }}

  ############################################################
  #
  # Self Sufficiency
  #
  ############################################################

  - sensor:

      - name: "HAES Self Sufficiency - Today"
        unique_id: haes_self_sufficiency_today
        icon: mdi:home-percent
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set consumption = states('sensor.haes_consumption_today') | float(0) %}
          {% set grid_import = states('sensor.haes_grid_import_today') | float(0) %}
          {% if consumption > 0 %}
            {{ ((1 - (grid_import / consumption)) * 100) | round(1) }}
          {% else %}
            0
          {% endif %}

  ############################################################
  #
  # Costs
  #
  ############################################################

  - sensor:

      - name: "HAES Cost - Today"
        unique_id: haes_cost_today
        icon: mdi:currency-eur
        unit_of_measurement: "EUR"
        device_class: monetary
        state_class: measurement
        state: >
          {% set energy_price = 0.25 %}
          {{ (states('sensor.haes_grid_import_today') | float(0) * energy_price) | round(2) }}

      - name: "HAES Cost Without PV - Today"
        unique_id: haes_cost_without_pv_today
        icon: mdi:cash-remove
        unit_of_measurement: "EUR"
        device_class: monetary
        state_class: measurement
        state: >
          {% set energy_price = 0.25 %}
          {{ (states('sensor.haes_consumption_today') | float(0) * energy_price) | round(2) }}

  ############################################################
  #
  # Savings
  #
  ############################################################

  - sensor:

      - name: "HAES Savings - Today"
        unique_id: haes_savings_today
        icon: mdi:cash-plus
        unit_of_measurement: "EUR"
        device_class: monetary
        state_class: measurement
        state: >
          {{
            (
              states('sensor.haes_cost_without_pv_today') | float(0)
              - states('sensor.haes_cost_today') | float(0)
            ) | round(2)
          }}