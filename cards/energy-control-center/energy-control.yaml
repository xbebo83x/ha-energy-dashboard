type: custom:button-card
name: Energy Control Center
icon: mdi:solar-power-variant
show_state: false
show_icon: false
show_name: false
custom_fields:
  content: |
    [[[
      const n = (e) => {
        const v = parseFloat(states[e]?.state);
        return isNaN(v) ? 0 : v;
      };

      const fmtW = (v) => `${Math.round(v)} W`;
      const fmtKwh = (v, d = 1) => `${v.toFixed(d)} kWh`;
      const fmtEuro = (v) => `€ ${Math.round(v)}`;

      if (typeof window._pvEM === 'undefined') {
        try { window._pvEM = JSON.parse(localStorage.getItem('pv_entities_v1') || '{}'); }
        catch(e) { window._pvEM = {}; }
      }
      window._pvEid = function(k, d) { return window._pvEM[k] || d; };

      // --- SENSORI (entity ID configurabili nel tab Configurazione) ---
      const pv = n(window._pvEid('pv', 'sensor.solarman_pv_power_w'));
      const casa = n(window._pvEid('casa', 'sensor.pow_generale_power'));
      const reteCt = n(window._pvEid('reteCt', 'sensor.solarman_power_from_grid'));
      const batt = n(window._pvEid('batt', 'sensor.solarman_battery_soc'));
      const prodOggi = n(window._pvEid('prodOggi', 'sensor.solarman_pv_etoday'));
      const importOggiKwh = n(window._pvEid('importOggi', 'sensor.solarman_etoday_received_from_grid'));
      const importOggiWh = importOggiKwh * 1000;
      const piccoRaggiunto = n(window._pvEid('picco', 'sensor.solarman_pv_power_peak_today'));
      const semState = states[window._pvEid('semState', 'sensor.smart_energy_manager_status')]?.state || 'Sconosciuto';
      const semTime = states[window._pvEid('semTime', 'sensor.battery_time_to_full')]?.state || '';
      const autoMode = states[window._pvEid('autoMode', 'automation.solarman_smart_energy_manager')]?.state === 'on';
      const emsMode = states[window._pvEid('emsMode', 'select.solarman_modalita_ems')]?.state || '';
      const maxCharge = n(window._pvEid('maxCharge', 'number.solarman_corrente_max_carica'));
      // ----------------

      const prevOggi = n(window._pvEid('prevOggi', 'sensor.solcast_pv_forecast_previsione_per_oggi'));
      const rimOggi = n(window._pvEid('rimOggi', 'sensor.solcast_pv_forecast_previsione_rimanente_per_oggi'));
      const domani = n(window._pvEid('domani', 'sensor.solcast_pv_forecast_previsione_per_domani'));
      const pot30 = n(window._pvEid('pot30', 'sensor.solcast_pv_forecast_potenza_tra_30_minuti'));
      const pot1h = n(window._pvEid('pot1h', 'sensor.solcast_pv_forecast_potenza_tra_1_ora'));

      const piccoPrev = n(window._pvEid('piccoPrev', 'sensor.solcast_pv_forecast_picco_di_previsione_per_oggi'));
      const oraPiccoRaw = states[window._pvEid('oraPicco', 'sensor.solcast_pv_forecast_orario_del_picco_per_oggi')]?.state || '';
      let oraPicco = '—';
      if (oraPiccoRaw && oraPiccoRaw !== 'unknown' && oraPiccoRaw !== 'unavailable') {
        const d = new Date(oraPiccoRaw);
        oraPicco = isNaN(d) ? oraPiccoRaw : d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
      }

      // --- SOGLIE TUNABLE (input_number) con fallback hardcoded ---
      const sogliaFVUtileW      = n('input_number.fv_soglia_utile_w')      || 300;
      const sogliaEvening       = n('input_number.fv_soglia_sera_kwh')      || 1;
      const surplusAltoW        = n('input_number.fv_surplus_alto_w')       || 1800;
      const surplusMedioW       = n('input_number.fv_surplus_medio_w')      || 800;
      const surplusBassoW       = n('input_number.fv_surplus_basso_w')      || 200;
      const battAltaSoglia      = n('input_number.batt_soglia_alta')        || 85;
      const battMediaSoglia     = n('input_number.batt_soglia_media')       || 65;
      const battBassaSoglia     = n('input_number.batt_soglia_bassa')       || 35;
      const battSerabuona       = n('input_number.batt_sera_buona')         || 70;
      const battSeraDiscreta    = n('input_number.batt_sera_discreta')      || 40;
      const trendUpRatio        = n('input_number.fv_trend_up_ratio')       || 1.20;
      const trendDownRatio      = n('input_number.fv_trend_down_ratio')     || 0.75;
      const scorePesoForecast   = n('input_number.score_peso_forecast')     || 0.25;
      const scorePesoAutsOggi   = n('input_number.score_peso_auts_oggi')    || 0.25;
      const scorePesoAutsMese   = n('input_number.score_peso_auts_mese')    || 0.25;
      const scorePesoBatt       = n('input_number.score_peso_batteria')     || 0.20;
      const scoreBonus          = n('input_number.score_bonus_max')         || 5;
      // -------------------------------------------------------------

      const now = new Date();
      const anno = now.getFullYear();
      const meseNum = now.getMonth() + 1;
      const mese = String(meseNum).padStart(2, '0');
      const giorniMese = new Date(anno, meseNum, 0).getDate();
      const giorno = now.getDate();

      const msBase = 'fv';
      const consumoMese = n('sensor.' + msBase + '_' + anno + '_' + mese + '_consumo_db');
      const produzioneMese = n('sensor.' + msBase + '_' + anno + '_' + mese + '_produzione_db');
      const importMese = n('sensor.' + msBase + '_' + anno + '_' + mese + '_import_db');
      const exportMese = n('sensor.' + msBase + '_' + anno + '_' + mese + '_export_db');

      const autosuffOggi = n('sensor.autosufficienza_oggi');
      const autosuffMese = consumoMese > 0 ? Math.max(0, Math.min(100, ((consumoMese - importMese) / consumoMese) * 100)) : 0;

      const costoKwh = n('input_number.costo_kwh_reale') || 0.25;
      const quotaGiorno = n('input_number.quota_fissa_giornaliera_corrente') || 0;
      const canoneTv = parseFloat((window._pvEM && window._pvEM['canoneTv']) ? window._pvEM['canoneTv'] : '18') || 0;
      const sspKwh = n('input_number.fv_valore_ssp_kwh') || 0.15;

      const fissi = (quotaGiorno * giorniMese) + canoneTv;
      const bollettaConFv = (importMese * costoKwh) + fissi;
      const bollettaSenzaFv = (consumoMese * costoKwh) + fissi;
      const ssp = exportMese * sspKwh;
      const beneficio = (bollettaSenzaFv - bollettaConFv) + ssp;
      const beneficioFine = giorno > 0 ? beneficio / giorno * giorniMese : beneficio;

      const percPrev = prevOggi > 0 ? Math.min(120, (prodOggi / prevOggi) * 100) : 0;
      const percBar = Math.min(100, percPrev);

      let reteNow = 'Bilanciato';
      if (reteCt > 20) reteNow = `Import ${fmtW(reteCt)}`;
      else if (reteCt < -20) reteNow = `Export ${fmtW(Math.abs(reteCt))}`;
      const copertura = reteCt < -20 ? 'Casa coperta dal FV' : reteCt > 20 ? 'Casa + carichi sopra FV' : 'Scambio rete quasi nullo';

      const trendUp = pot1h > pv * trendUpRatio;
      const trendDown = pot1h < pv * trendDownRatio;
      const trendLabel = trendUp ? 'In salita' : trendDown ? 'In calo' : 'Stabile';
      const trendIcon = trendUp ? '↗' : trendDown ? '↘' : '→';
      const trendClass = trendUp ? 'good' : trendDown ? 'warn' : 'blue';

      const hour = now.getHours();
      const surplus = pv - casa;
      const surplus30 = pot30 - casa;
      const surplus1h = pot1h - casa;
      const isEvening = hour >= 17 || rimOggi < sogliaEvening;

      let convScore = 20;
      if (surplus > surplusAltoW) convScore += 35;
      else if (surplus > surplusMedioW) convScore += 25;
      else if (surplus > surplusBassoW) convScore += 15;
      else if (surplus < -300) convScore -= 10;

      if (surplus30 > surplusMedioW || surplus1h > surplusMedioW) convScore += 18;
      else if (surplus30 > surplusBassoW || surplus1h > surplusBassoW) convScore += 10;
      else if (surplus30 < 0 && surplus1h < 0) convScore -= 12;

      if (batt > battAltaSoglia) convScore += 15;
      else if (batt > battMediaSoglia) convScore += 8;
      else if (batt < battBassaSoglia) convScore -= 15;

      if (trendDown) convScore -= 12;
      if (trendUp) convScore += 8;
      if (isEvening && surplus <= 0) convScore = Math.min(convScore, batt > battSerabuona ? 35 : 25);
      if (pv < 300 && casa > pv) convScore = Math.min(convScore, 20);
      convScore = Math.max(0, Math.min(100, Math.round(convScore)));

      let convColor = '#ff7043';
      if (convScore >= 80) convColor = '#35ff76';
      else if (convScore >= 60) convColor = '#66bb6a';
      else if (convScore >= 40) convColor = '#ffca28';
      else if (convScore >= 25) convColor = '#ff9800';

      let score = 0;
      score += Math.min(percPrev, 100) * scorePesoForecast;
      score += Math.min(autosuffOggi, 100) * scorePesoAutsOggi;
      score += Math.min(autosuffMese, 100) * scorePesoAutsMese;
      score += Math.min(batt, 100) * scorePesoBatt;
      score += importOggiWh < 1000 ? scoreBonus : importOggiWh < 3000 ? 3 : 1;
      score = Math.min(100, Math.round(score));

      let voto = 'Da migliorare';
      let colore = '#ff7043';
      if (score >= 90) { voto = 'Eccellente'; colore = '#35ff76'; }
      else if (score >= 80) { voto = 'Ottimo'; colore = '#66bb6a'; }
      else if (score >= 65) { voto = 'Buono'; colore = '#ffca28'; }
      else if (score >= 50) { voto = 'Discreto'; colore = '#ff9800'; }

      let titoloDecisione = 'Situazione stabile';
      let testoDecisione = 'L\'impianto sta lavorando regolarmente. Mantieni i consumi normali.';
      let decisionClass = 'blue';
      if (convScore >= 80) {
        titoloDecisione = 'Usa energia ora';
        testoDecisione = 'Alta convenienza: produzione disponibile e condizioni buone per carichi pesanti.';
        decisionClass = 'good';
      } else if (convScore >= 60) {
        titoloDecisione = 'Buon momento';
        testoDecisione = 'Convenienza buona: puoi spostare qualche consumo, senza esagerare.';
        decisionClass = 'good';
      } else if (convScore >= 40) {
        titoloDecisione = 'Valuta con calma';
        testoDecisione = 'Convenienza media: usa solo carichi utili, meglio evitare consumi lunghi.';
        decisionClass = 'warn';
      } else if (isEvening || trendDown || pv < casa) {
        titoloDecisione = 'Preserva batteria';
        testoDecisione = 'Ora non conviene caricare consumi pesanti: stai usando rete o batteria.';
        decisionClass = 'warn';
      } else if (batt < battBassaSoglia) {
        titoloDecisione = 'Limita i consumi';
        testoDecisione = 'Batteria bassa: evita carichi non indispensabili fino a nuova produzione.';
        decisionClass = 'danger';
      }

      const seraLabel = batt >= battSerabuona ? 'Buona' : batt >= battSeraDiscreta ? 'Discreta' : 'Critica';

      const parseTimeValue = (raw) => {
        if (!raw || raw === 'unknown' || raw === 'unavailable') return null;
        const txt = String(raw).trim();
        let d = new Date(txt);
        if (!isNaN(d)) return d;
        const m = txt.match(/(\d{1,2})[:.](\d{2})/);
        if (m) {
          d = new Date(now);
          d.setHours(parseInt(m[1], 10), parseInt(m[2], 10), 0, 0);
          return d;
        }
        return null;
      };

      const findTimeState = (needles) => {
        const ids = Object.keys(states || {});
        for (const id of ids) {
          const low = id.toLowerCase();
          if (needles.every(x => low.includes(x))) {
            const d = parseTimeValue(states[id]?.state);
            if (d) return d;
          }
        }
        return null;
      };

      const getAttrTime = (entityId, attrNames) => {
        const a = states[entityId]?.attributes || {};
        for (const k of Object.keys(a)) {
          const low = k.toLowerCase();
          if (attrNames.some(x => low.includes(x))) {
            const d = parseTimeValue(a[k]);
            if (d) return d;
          }
        }
        return null;
      };

      const slotTime = (slot) => {
        if (!slot || typeof slot !== 'object') return null;
        const raw = slot.period_start || slot.periodStart || slot.start || slot.start_time || slot.datetime || slot.time;
        return parseTimeValue(raw);
      };

      const slotEnergyKwh = (slot) => {
        if (!slot || typeof slot !== 'object') return null;
        const keys = ['pv_estimate', 'pvEstimate', 'estimate', 'energy', 'kwh', 'pv_estimate10', 'pv_estimate90'];
        for (const k of keys) {
          const v = parseFloat(slot[k]);
          if (!isNaN(v)) return v;
        }
        return null;
      };

      const slotPowerW = (slot, durationHours) => {
        if (!slot || typeof slot !== 'object') return 0;
        const powerKeys = ['power', 'watts', 'watt', 'pv_power', 'pvPower', 'power_estimate', 'estimated_power'];
        for (const k of powerKeys) {
          const v = parseFloat(slot[k]);
          if (!isNaN(v)) return v;
        }
        const e = slotEnergyKwh(slot);
        if (e !== null && durationHours > 0) return (e / durationHours) * 1000;
        return 0;
      };

      const findSolcastForecastSlots = () => {
        const candidates = [];
        const ids = Object.keys(states || {}).filter(id => id.toLowerCase().includes('solcast'));
        for (const id of ids) {
          const attrs = states[id]?.attributes || {};
          for (const k of Object.keys(attrs)) {
            const val = attrs[k];
            if (!Array.isArray(val) || val.length < 2) continue;
            const usable = val.filter(x => x && typeof x === 'object' && slotTime(x));
            if (usable.length >= 2) candidates.push(usable);
          }
        }
        candidates.sort((a, b) => b.length - a.length);
        return candidates[0] || [];
      };

      const calcUsefulFvWindow = () => {
        const slotsRaw = findSolcastForecastSlots();
        if (!slotsRaw.length) return null;

        const todayKey = now.toDateString();
        const slots = slotsRaw
          .map((slot) => ({ slot, t: slotTime(slot) }))
          .filter(x => x.t && x.t.toDateString() === todayKey)
          .sort((a, b) => a.t - b.t);

        if (slots.length < 2) return null;

        const useful = [];
        for (let i = 0; i < slots.length; i++) {
          const t = slots[i].t;
          const next = i < slots.length - 1 ? slots[i + 1].t : new Date(t.getTime() + 30 * 60 * 1000);
          const durationHours = Math.max((next - t) / 3600000, 0.5);
          const powerW = slotPowerW(slots[i].slot, durationHours);
          if (powerW >= sogliaFVUtileW) {
            useful.push({ start: t, end: next, powerW });
          }
        }

        if (!useful.length) return null;
        return {
          start: useful[0].start,
          end: useful[useful.length - 1].end,
          found: true
        };
      };

      const usefulWindow = calcUsefulFvWindow();

      let fvStart = usefulWindow?.start ||
        parseTimeValue(states['sensor.solcast_pv_forecast_inizio_produzione_oggi']?.state) ||
        parseTimeValue(states['sensor.solcast_pv_forecast_produzione_inizio_oggi']?.state) ||
        parseTimeValue(states['sensor.solcast_pv_forecast_start_production_today']?.state) ||
        findTimeState(['solcast','inizio','produzione']) ||
        findTimeState(['solcast','start','production']) ||
        getAttrTime('sensor.solcast_pv_forecast_previsione_per_oggi', ['inizio','start']);

      let fvEnd = usefulWindow?.end ||
        parseTimeValue(states['sensor.solcast_pv_forecast_fine_produzione_oggi']?.state) ||
        parseTimeValue(states['sensor.solcast_pv_forecast_produzione_fine_oggi']?.state) ||
        parseTimeValue(states['sensor.solcast_pv_forecast_end_production_today']?.state) ||
        findTimeState(['solcast','fine','produzione']) ||
        findTimeState(['solcast','end','production']) ||
        getAttrTime('sensor.solcast_pv_forecast_previsione_per_oggi', ['fine','end']);

      if (!fvStart) { fvStart = new Date(now); fvStart.setHours(6, 30, 0, 0); }
      if (!fvEnd) { fvEnd = new Date(now); fvEnd.setHours(20, 30, 0, 0); }
      if (fvEnd <= fvStart) fvEnd = new Date(fvStart.getTime() + 12 * 60 * 60 * 1000);

      const totalFvMs = Math.max(1, fvEnd - fvStart);
      const elapsedFvMs = Math.min(Math.max(now - fvStart, 0), totalFvMs);
      const fvWindowPerc = Math.round((elapsedFvMs / totalFvMs) * 100);
      const remainingFvMs = Math.max(0, fvEnd - now);
      const remainH = Math.floor(remainingFvMs / 3600000);
      const remainM = Math.floor((remainingFvMs % 3600000) / 60000);
      const fvStartTxt = fvStart.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
      const fvEndTxt = fvEnd.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
      const nowTxt = now.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
      const remainTxt = now < fvStart
        ? 'deve ancora iniziare'
        : now > fvEnd
          ? 'produzione utile conclusa'
          : `${remainH}h ${String(remainM).padStart(2,'0')}m utili rimanenti`;
      const fvWindowSource = usefulWindow?.found
        ? `Calcolata dagli slot Solcast sopra ${sogliaFVUtileW} W`
        : 'Fallback: orari produzione Solcast / default';

      const updated = now.toLocaleString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });

      // Stato overlay persistente tra i re-render di button-card
      if (typeof window._pvSettingsOpen === 'undefined') window._pvSettingsOpen = false;
      const overlayDisplay = window._pvSettingsOpen ? 'flex' : 'none';
      if (typeof window._pvSettingsTab === 'undefined') window._pvSettingsTab = 0;
      if (typeof window._pvSubGroup === 'undefined') window._pvSubGroup = 0;

      // Floating tooltips – appended to body so they are never clipped
      window._pvTipShow = function(el) {
        window._pvTipHide();
        var t = document.createElement('div');
        t.className = 'pvs-ftip';
        t.textContent = el.dataset.tip;
        var r = el.getBoundingClientRect();
        var lp = Math.max(8, r.right - 248);
        t.style.cssText = 'position:fixed;z-index:9999;width:240px;background:rgba(4,16,36,.98);border:1px solid rgba(0,200,255,.42);border-radius:11px;padding:10px 13px;font-size:10.5px;color:rgba(255,255,255,.9);line-height:1.55;pointer-events:none;box-shadow:0 10px 32px rgba(0,0,0,.72);left:'+lp+'px;top:'+(r.top-10)+'px;transform:translateY(-100%);font-family:var(--paper-font-body1_-_font-family);';
        document.body.appendChild(t);
      };
      window._pvTipHide = function() {
        document.querySelectorAll('.pvs-ftip').forEach(function(e){e.remove();});
      };
      window._pvCopy = function(btn) {
        var pre = btn.closest('.pve-yaml-wrap').querySelector('pre');
        navigator.clipboard.writeText(pre.textContent);
        btn.textContent = 'Copiato!';
        setTimeout(function() { btn.textContent = 'Copia'; }, 1500);
      };
      window._pvSaveEid = function(key, val) {
        window._pvEM[key] = val.trim();
        try { localStorage.setItem('pv_entities_v1', JSON.stringify(window._pvEM)); } catch(e) {}
      };
      window._pvUpdateBadge = function(input) {
        var eid = input.value.trim();
        var row = input.closest('.pve-row');
        if (!row) return;
        var badge = row.querySelector('.pve-ok, .pve-miss');
        if (!badge) return;
        try {
          var hass = document.querySelector('home-assistant').hass;
          var s = hass.states[eid];
          var ok = s && s.state !== 'unknown' && s.state !== 'unavailable';
          if (ok) {
            var uom = (s.attributes && s.attributes.unit_of_measurement) ? ' ' + s.attributes.unit_of_measurement : '';
            var v = s.state; if (v.length > 11) v = v.substring(0, 11) + '..';
            badge.className = 'pve-ok';
            badge.textContent = '\u2713 ' + v + uom;
          } else {
            badge.className = 'pve-miss';
            badge.textContent = '\u2717 N/D';
          }
        } catch(e) {}
      };
      window._pvResetEid = function() {
        window._pvEM = {};
        try { localStorage.removeItem('pv_entities_v1'); } catch(e) {}
      };

      // Colori contestuali mini card
      const miniBattColor = batt > battAltaSoglia ? '#35ff76' : batt > battBassaSoglia ? '#ffca28' : '#ff6b6b';
      const miniCasaColor = surplus > 0 ? '#ffb74d' : '#ff6b6b';
      const miniReteColor = reteCt > 20 ? '#ff6b6b' : reteCt < -20 ? '#b76cff' : '#42a5f5';

      // Helper per righe slider nel pannello settings
      const sRow = (label, entity, unit, fallback, sMin, sMax, sStep) => {
        unit = (unit !== undefined) ? unit : '';
        fallback = (fallback !== undefined) ? fallback : null;
        sMin = (sMin !== undefined) ? sMin : 0;
        sMax = (sMax !== undefined) ? sMax : 100;
        sStep = (sStep !== undefined) ? sStep : 1;
        const val = states[entity];
        const cur = (val && val.state !== 'unknown' && val.state !== 'unavailable') ? parseFloat(val.state) : null;
        const min  = (val && val.attributes && val.attributes.min  != null) ? val.attributes.min  : sMin;
        const max  = (val && val.attributes && val.attributes.max  != null) ? val.attributes.max  : sMax;
        const step = (val && val.attributes && val.attributes.step != null) ? val.attributes.step : sStep;
        const eff  = (cur !== null && !isNaN(cur)) ? cur : (fallback !== null ? fallback : min);
        const missing = (cur === null || isNaN(cur));
        const pct = Math.round(Math.max(0, Math.min(100, ((eff - min) / Math.max(max - min, 0.0001)) * 100)));
        const unitStr = unit ? ' ' + unit : '';
        const badge = missing
          ? '<span class="smissing">default ' + eff + unitStr + '</span>'
          : '';
        const onInput = [
          "var p=Math.round((this.value-" + min + ")/(" + max + "-" + min + ")*100);",
          "this.style.background='linear-gradient(90deg,#42a5f5 '+p+'%,rgba(255,255,255,.18) '+p+'%)';",
          "this.closest('.srow').querySelector('.slive').textContent=this.value+'" + (unit ? ' '+unit : '') + "';",
          "var b=this.closest('.srow').querySelector('.smissing');if(b)b.style.display='none';"
        ].join('');
        const onChange = "(()=>{try{const h=document.querySelector('home-assistant').hass;"
          + "h.callService('input_number','set_value',{entity_id:'" + entity + "',value:parseFloat(this.value)});"
          + "}catch(e){}})()";
        const bg = 'linear-gradient(90deg,#42a5f5 ' + pct + '%,rgba(255,255,255,.18) ' + pct + '%)';
        return '<div class="srow" style="pointer-events:all;">'
          + '<div class="srow-top">'
          + '<span class="slabel">' + label + '</span>'
          + '<span class="slive-wrap">' + badge + '<span class="slive">' + eff + unitStr + '</span></span>'
          + '</div>'
          + '<input class="sslider" type="range" min="' + min + '" max="' + max + '" step="' + step + '" value="' + eff + '"'
          + ' style="background:' + bg + '"'
          + ' oninput="' + onInput + '"'
          + ' onchange="' + onChange + '"/>'
          + '<div class="srow-range"><span>' + min + unitStr + '</span><span>' + max + unitStr + '</span></div>'
          + '</div>';
      };

