mdi:tune\n    mode: slider\n\n  score_peso_auts_oggi:\n    name: "Peso auts. oggi"\n    min: 0\n    max: 0.5\n    step: 0.05\n    icon: mdi:tune\n    mode: slider\n\n  score_peso_auts_mese:\n    name: "Peso auts. mese"\n    min: 0\n    max: 0.5\n    step: 0.05\n    icon: mdi:tune\n    mode: slider\n\n  score_peso_batteria:\n    name: "Peso batteria"\n    min: 0\n    max: 0.5\n    step: 0.05\n    icon: mdi:tune\n    mode: slider\n\n  score_bonus_max:\n    name: "Bonus import"\n    min: 0\n    max: 10\n    step: 1\n    icon: mdi:tune\n    mode: slider\n\n  costo_kwh_reale:\n    name: "Costo kWh"\n    min: 0.05\n    max: 0.8\n    step: 0.01\n    unit_of_measurement: "EUR"\n    icon: mdi:tune\n    mode: slider\n\n  quota_fissa_giornaliera_corrente:\n    name: "Quota fissa/g"\n    min: 0\n    max: 2.0\n    step: 0.01\n    unit_of_measurement: "EUR"\n    icon: mdi:tune\n    mode: slider\n\n  fv_valore_ssp_kwh:\n    name: "Valore SSP kWh"\n    min: 0.05\n    max: 0.5\n    step: 0.01\n    unit_of_measurement: "EUR"\n    icon: mdi:tune\n    mode: slider\n';

      const cfgRow = function(label, key, def, note) {
