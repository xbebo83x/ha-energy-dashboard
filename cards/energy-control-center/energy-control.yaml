                    ${sRow('Soglia sera (kWh)', 'input_number.fv_soglia_sera_kwh',  'kWh', 1, 0.1, 5.0, 0.1)}
                  </div>
                </div>

                <!-- COLONNA 2 -->
                <div class="pvs-col">
                  <div class="pvs-section">
                    <div class="pvs-section-title">🔋 Soglie batteria
                      <span class="pvs-tip" data-tip="Determinano il bonus/malus batteria nel punteggio convenienza: SOC > alta = +15, > media = +8, < bassa = -15. Le soglie sera controllano l'etichetta (Buona/Discreta/Critica) mostrata nella dashboard." onmouseenter="window._pvTipShow(this)" onmouseleave="window._pvTipHide()">?</span>
                    </div>
                    ${sRow('Soglia alta',   'input_number.batt_soglia_alta',   '%', 85, 50, 100, 5)}
                    ${sRow('Soglia media',  'input_number.batt_soglia_media',  '%', 65, 30,  90, 5)}
                    ${sRow('Soglia bassa',  'input_number.batt_soglia_bassa',  '%', 35, 10,  60, 5)}
                    ${sRow('Sera buona',    'input_number.batt_sera_buona',    '%', 70, 40, 100, 5)}
                    ${sRow('Sera discreta', 'input_number.batt_sera_discreta', '%', 40, 20,  80, 5)}
                  </div>
                </div>

                <!-- COLONNA 3 -->
                <div class="pvs-col">
                  <div class="pvs-section">
                    <div class="pvs-section-title">🏆 Pesi score
                      <span class="pvs-tip" data-tip="L'indice di performance (0-100) è la media pesata di: % previsione raggiunta, autosufficienza oggi, autosufficienza mese, SOC batteria. La somma dei 4 pesi dovrebbe essere ~0.95. Il bonus max viene assegnato se l'import di oggi è sotto 1 kWh." onmouseenter="window._pvTipShow(this)" onmouseleave="window._pvTipHide()">?</span>
                    </div>
                    ${sRow('Peso forecast',       'input_number.score_peso_forecast',  '', 0.25, 0, 0.5, 0.05)}
                    ${sRow('Peso autosuff. oggi', 'input_number.score_peso_auts_oggi', '', 0.25, 0, 0.5, 0.05)}
                    ${sRow('Peso autosuff. mese', 'input_number.score_peso_auts_mese', '', 0.25, 0, 0.5, 0.05)}
                    ${sRow('Peso batteria',       'input_number.score_peso_batteria',  '', 0.20, 0, 0.5, 0.05)}
                    ${sRow('Bonus import basso',  'input_number.score_bonus_max',      '',    5, 0,  10, 1)}
                  </div>
                  <div class="pvs-section">
                    <div class="pvs-section-title">💶 Tariffe
                      <span class="pvs-tip" data-tip="Parametri economici per il calcolo della bolletta stimata. Costo kWh = prezzo energia acquistata. Quota fissa = quota fissa giornaliera del contratto. SSP = valore riconosciuto per ogni kWh esportato in rete (Scambio sul Posto)." onmouseenter="window._pvTipShow(this)" onmouseleave="window._pvTipHide()">?</span>
                    </div>
                    ${sRow('Costo kWh',          'input_number.costo_kwh_reale',                 'EUR', 0.25, 0.05, 0.80, 0.01)}
                    ${sRow('Quota fissa/giorno', 'input_number.quota_fissa_giornaliera_corrente', 'EUR', 0,    0,    2.00, 0.01)}
                    ${sRow('Valore SSP kWh',     'input_number.fv_valore_ssp_kwh',               'EUR', 0.15, 0.05, 0.50, 0.01)}
                  </div>
                </div>

              </div>
              <div class="pvs-body-entities" style="display:${window._pvSettingsTab===1?'flex':'none'}">
                ${entityTabHtml}
              </div>
            </div>
          </div>
          <!-- /SETTINGS OVERLAY -->

        </div>
      `;
    ]]]
tap_action:
  action: none
hold_action:
  action: none
styles:
  card:
    - width: 1440px
    - max-width: 94vw
    - height: 650px
    - overflow: hidden
    - border-radius: 28px
    - padding: 0
    - color: white
    - background: >-
        linear-gradient(135deg, rgba(0,70,46,.78), rgba(8,18,22,.98) 45%,
        rgba(7,42,54,.92))
    - border: 1px solid rgba(0,255,170,.35)
    - box-shadow: 0 14px 34px rgba(0,0,0,.45)
  grid:
    - grid-template-areas: content
    - grid-template-columns: 1fr
    - grid-template-rows: 1fr
  custom_fields:
    content:
      - width: 100%
      - height: 100%
      - text-align: left
extra_styles: |
  .ecc-wrap {
    box-sizing: border-box;
    width: 100%;
    height: 650px;
    padding: 14px 20px 7px;
    display: grid;
    grid-template-rows: 54px 206px 66px 1fr 22px;
    gap: 8px;
    font-family: var(--paper-font-body1_-_font-family);
    overflow: hidden;
    position: relative;
  }

  .ecc-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 13px;
  }

  .brand-icon {
    width: 50px;
    height: 50px;
    display: grid;
    place-items: center;
    border-radius: 15px;
    font-size: 23px;
    background: rgba(255,202,40,.12);
    border: 1px solid rgba(255,202,40,.25);
  }

  .title {
    font-size: 23px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: -.5px;
  }

  .sub {
    margin-top: 6px;
    font-size: 12px;
    opacity: .72;
    font-weight: 500;
  }

  .score {
    min-width: 230px;
    padding: 10px 18px 8px;
    border-radius: 20px;
    text-align: center;
  }

  .score-main {
    font-size: 17px;
    font-weight: 900;
  }

  .score-sub {
    margin-top: 3px;
    font-size: 10px;
    opacity: .78;
  }

  .row-main {
    display: grid;
    grid-template-columns: 370px 1fr 530px;
    gap: 10px;
    min-width: 0;
  }

  .panel {
    border-radius: 22px;
    padding: 13px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
    overflow: hidden;
  }

  .panel-title {
    font-size: 14px;
    font-weight: 900;
    margin-bottom: 11px;
    color: rgba(255,255,255,.95);
  }

  .panel-title small {
    font-size: 12px;
    opacity: .72;
    font-weight: 700;
  }

  .wide-title {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .wide-title em {
    margin-left: auto;
    padding: 5px 10px;
    border-radius: 999px;
    font-style: normal;
    font-size: 10px;
    color: #35ff76;
    background: rgba(53,255,118,.08);
    border: 1px solid rgba(53,255,118,.35);
  }

  .prod-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-top: 2px;
  }

  .prod-line span {
    font-size: 52px;
    font-weight: 950;
    letter-spacing: -1.5px;
    line-height: 1;
  }

  .prod-line b {
    font-size: 17px;
    opacity: .75;
  }

  .bar {
    height: 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.14);
    overflow: hidden;
    margin: 10px 0 12px;
  }

  .bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width .6s ease;
  }

  .kv {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    line-height: 1.65;
  }

  .kv span {
    opacity: .7;
  }

  .kv b {
    font-size: 11px;
  }

  .status-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .mini {
    border-radius: 15px;
    padding: 8px 10px;
    background: rgba(255,255,255,.075);
    min-height: 40px;
  }

  .mini span {
    display: block;
    font-size: 11px;
    opacity: .72;
  }

  .mini b {
    display: block;
    margin-top: 4px;
    font-size: 15px;
    white-space: nowrap;
  }

  .status-pill {
    margin-top: 7px;
    padding: 6px 10px;
    border-radius: 999px;
    text-align: center;
    font-size: 11px;
    line-height: 1.1;
    background: rgba(0,0,0,.18);
    opacity: .86;
  }

  .decision {
    padding: 16px;
  }

  .decision-head {
    display: flex;
    justify-content: space-between;
    align-items: start;
  }

  .shield {
    width: 50px;
    height: 50px;
    display: grid;
    place-items: center;
    border-radius: 20px;
    color: #35ff76;
    border: 4px solid rgba(53,255,118,.75);
    font-size: 34px;
    font-weight: 900;
    opacity: .9;
  }

  .decision-title {
    margin-top: 4px;
    font-size: 26px;
    font-weight: 950;
    letter-spacing: -.5px;
  }

  .decision-text {
    margin-top: 5px;
    font-size: 15px;
    line-height: 1.28;
    font-weight: 700;
    max-width: 470px;
  }

  .decision-sep {
    height: 1px;
    background: rgba(255,255,255,.13);
    margin: 10px 0 8px;
  }

  .conv-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    opacity: .82;
  }

  .conv-row b {
    font-size: 19px;
    opacity: 1;
  }

  .conv-bar {
    position: relative;
    height: 8px;
    border-radius: 999px;
    background: rgba(255,255,255,.14);
    margin-top: 7px;
  }

  .conv-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg,#ff5252,#ffca28,#35ff76);
    transition: width .6s ease;
  }

  .conv-bar i {
    position: absolute;
    top: -3px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid white;
    background: #35ff76;
  }

  .money-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    border-radius: 22px;
    padding: 10px 18px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
  }

  .money {
    display: grid;
    grid-template-columns: 42px 1fr;
    grid-template-rows: 18px 1fr;
    column-gap: 12px;
    align-items: center;
    border-right: 1px solid rgba(255,255,255,.15);
    padding: 0 14px;
  }

  .money:last-child { border-right: none; }

  .money i {
    grid-row: 1 / span 2;
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: 14px;
    background: rgba(0,0,0,.18);
    font-style: normal;
    font-size: 21px;
  }

  .money span {
    font-size: 12px;
    opacity: .72;
    line-height: 1.15;
  }

  .money b {
    font-size: 23px;
    font-weight: 950;
  }

  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 10px;
    min-width: 0;
    min-height: 0;
  }

  .big {
    font-size: 17px;
    margin-bottom: 7px;
  }

  .today-inner {
    display: grid;
    grid-template-columns: 1fr 190px;
    gap: 14px;
    height: calc(100% - 30px);
  }

  .today-list {
    border-top: 1px solid rgba(255,255,255,.13);
    padding-top: 7px;
  }

  .today-list div {
    display: grid;
    grid-template-columns: 178px 1fr;
    gap: 16px;
    font-size: 12px;
    line-height: 1.40;
  }

  .today-list span {
    opacity: .75;
  }

  .today-list b {
    font-size: 11.5px;
  }

  .today-list em {
    color: #ffb74d;
    font-style: normal;
  }

  .fv-window {
    display: grid;
    align-content: center;
    text-align: center;
    padding: 10px 10px 8px;
    border-radius: 18px;
    background: rgba(0,0,0,.16);
    border: 1px solid rgba(255,255,255,.10);
    min-width: 0;
  }

  .fv-window-title {
    font-size: 11px;
    font-weight: 900;
    opacity: .88;
    margin-bottom: 10px;
  }

  .fv-track {
    position: relative;
    height: 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.15);
    overflow: visible;
    margin: 6px 4px 9px;
  }

  .fv-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg,#ffca28,#35ff76,#42a5f5);
    transition: width .6s ease;
  }

  .fv-dot {
    position: absolute;
    top: -17px;
    width: 22px;
    height: 22px;
    display: grid;
    place-items: center;
    font-size: 17px;
    filter: drop-shadow(0 0 5px rgba(255,202,40,.55));
  }

  .fv-times {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
    margin-top: 6px;
  }

  .fv-times span {
    font-size: 10px;
    opacity: .65;
  }

  .fv-times b {
    font-size: 13px;
    color: #ffca28;
  }

  .fv-remain {
    margin-top: 8px;
    font-size: 13px;
    font-weight: 850;
    color: #35ff76;
    white-space: nowrap;
  }

  .fv-window small {
    margin-top: 6px;
    font-size: 9.5px;
    opacity: .55;
  }

  .quick-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    height: calc(100% - 42px);
  }

  .q {
    border-radius: 16px;
    background: rgba(255,255,255,.075);
    display: grid;
    align-content: center;
    justify-items: center;
    text-align: center;
    padding: 9px;
  }

  .q div {
    font-size: 29px;
    line-height: 1;
    margin-bottom: 7px;
  }

  .q span {
    font-size: 11px;
    opacity: .78;
  }

  .q b {
    font-size: 17px;
    margin-top: 6px;
    white-space: nowrap;
  }

  .q small {
    margin-top: 7px;
    font-size: 10px;
    opacity: .62;
  }

  .footer {
    border-top: 1px solid;
    border-image: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent) 1;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 42px;
    font-size: 11px;
    opacity: .76;
    padding-bottom: 2px;
  }

  .settings-btn {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    border-radius: 14px;
    font-size: 22px;
    cursor: pointer;
    background: rgba(0,200,255,.10);
    border: 1px solid rgba(0,200,255,.28);
    flex-shrink: 0;
    transition: background .2s, border-color .2s;
    user-select: none;
  }

  .settings-btn:hover {
    background: rgba(0,200,255,.22);
    border-color: rgba(0,200,255,.55);
  }

  .good, .good-text { color: #35ff76 !important; }
  .warn, .warn-text { color: #ffb74d !important; }
  .danger, .danger-text { color: #ff6b6b !important; }
  .blue, .blue-text { color: #42a5f5 !important; }
  .purple-text { color: #b76cff !important; }

  /* ── SETTINGS OVERLAY ── */
  .pvs-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 28px;
  }

  .pvs-modal {
    width: 92%;
    max-width: 840px;
    max-height: 90%;
    border-radius: 22px;
    pointer-events: all;
    background: linear-gradient(145deg, rgba(2,12,34,.99), rgba(4,9,20,.99) 55%, rgba(2,10,28,.99));
    border: 1px solid rgba(0,200,255,.40);
    box-shadow: 0 28px 80px rgba(0,0,0,.88), 0 0 0 1px rgba(0,200,255,.06), inset 0 1px 0 rgba(255,255,255,.06);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }


  .pvs-modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px 16px;
    background: linear-gradient(90deg, rgba(0,200,255,.09), rgba(0,80,160,.04) 60%, transparent);
    border-bottom: 1px solid rgba(0,200,255,.22);
    flex-shrink: 0;
  }

  .pvs-icon {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    border-radius: 14px;
    font-size: 22px;
    background: linear-gradient(135deg, rgba(0,200,255,.22), rgba(0,120,220,.10));
    border: 1px solid rgba(0,200,255,.44);
    box-shadow: 0 0 16px rgba(0,200,255,.16), inset 0 1px 0 rgba(255,255,255,.10);
    flex-shrink: 0;
  }

  .pvs-title {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -.4px;
    background: linear-gradient(90deg, #ffffff 40%, rgba(0,220,255,.85));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .pvs-sub {
    margin-top: 4px;
    font-size: 11px;
    color: rgba(0,220,255,.72);
    letter-spacing: .15px;
  }

  .pvs-close {
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.18);
    transition: background .15s, border-color .15s;
    flex-shrink: 0;
    color: rgba(255,255,255,.7);
  }

  .pvs-close:hover {
    background: rgba(255,70,70,.30);
    border-color: rgba(255,70,70,.55);
    color: white;
  }

  .pvs-save-hdr {
    height: 32px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid rgba(53,255,118,.45);
    background: rgba(53,255,118,.12);
    color: #35ff76;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .pvs-save-hdr:hover {
    background: rgba(53,255,118,.25);
    border-color: rgba(53,255,118,.70);
  }

  .pvs-modal-body {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    padding: 14px 16px 18px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,200,255,.35) rgba(255,255,255,.04);
  }

  .pvs-modal-body::-webkit-scrollbar { width: 5px; }
  .pvs-modal-body::-webkit-scrollbar-track { background: rgba(255,255,255,.04); border-radius:999px; }
  .pvs-modal-body::-webkit-scrollbar-thumb { background: rgba(0,200,255,.35); border-radius:999px; }

  .pvs-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .pvs-section {
    background: rgba(255,255,255,.055);
    border: 1px solid rgba(255,255,255,.11);
    border-radius: 16px;
    padding: 13px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .pvs-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, rgba(0,200,255,.55), transparent);
    pointer-events: none;
  }

  .pvs-section-title {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 900;
    color: rgba(255,255,255,.88);
    text-transform: uppercase;
    letter-spacing: .8px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,.11);
  }

  .pvs-tip {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(0,200,255,.18);
    border: 1px solid rgba(0,200,255,.45);
    color: rgba(0,200,255,1);
    font-size: 9px;
    font-weight: 900;
    display: inline-grid;
    place-items: center;
    cursor: help;
    flex-shrink: 0;
    margin-left: auto;
    text-transform: none;
    letter-spacing: 0;
    transition: background .15s, border-color .15s, box-shadow .15s;
  }

  .pvs-tip:hover {
    background: rgba(0,200,255,.32);
    border-color: rgba(0,200,255,.72);
    box-shadow: 0 0 8px rgba(0,200,255,.35);
  }

  .srow {
    display: flex;
    flex-direction: column;
  }

  .srow-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 5px;
  }

  .slabel {
    font-size: 11.5px;
    opacity: .84;
    font-weight: 600;
  }

  .slive-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .slive {
    font-size: 14px;
    font-weight: 900;
    color: #7ecfff;
    letter-spacing: -.3px;
  }

  .sunit {
    font-size: 10px;
    opacity: .65;
    color: #42a5f5;
  }

  .smissing {
    font-size: 9px;
    font-weight: 700;
    color: #ffca28;
    background: rgba(255,202,40,.12);
    border: 1px solid rgba(255,202,40,.30);
    border-radius: 6px;
    padding: 1px 5px;
    letter-spacing: .3px;
  }

  .sslider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 999px;
    outline: none;
    cursor: pointer;
    border: none;
  }

  .sslider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: white;
    border: 2px solid #42a5f5;
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(66,165,245,.18), 0 0 8px rgba(66,165,245,.55), 0 2px 5px rgba(0,0,0,.5);
    transition: transform .12s, box-shadow .12s;
  }

  .sslider::-webkit-slider-thumb:hover {
    transform: scale(1.25);
    box-shadow: 0 0 0 5px rgba(66,165,245,.28), 0 0 14px rgba(66,165,245,.65), 0 2px 5px rgba(0,0,0,.5);
  }

  .sslider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: white;
    border: 2px solid #42a5f5;
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(66,165,245,.18), 0 0 8px rgba(66,165,245,.55);
  }

  .srow-range {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    opacity: .38;
    margin-top: 3px;
    padding: 0 1px;
  }

  /* ── TABS ── */
  .pvs-tab-bar {
    display: flex;
    gap: 6px;
    padding: 10px 16px 0;
    border-bottom: 1px solid rgba(255,255,255,.09);
    flex-shrink: 0;
  }

  .pvs-tab {
    padding: 7px 18px;
    border-radius: 10px 10px 0 0;
    border: 1px solid rgba(255,255,255,.10);
    border-bottom: none;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,.55);
    background: rgba(255,255,255,.04);
    cursor: pointer;
    letter-spacing: .3px;
    transition: background .15s, color .15s;
    user-select: none;
    outline: none;
  }

  .pvs-tab:hover {
    background: rgba(0,200,255,.12);
    color: rgba(255,255,255,.85);
  }

  .pvs-tab-active {
    background: rgba(0,200,255,.16) !important;
    color: white !important;
    border-color: rgba(0,200,255,.35) !important;
    border-bottom: 1px solid transparent !important;
    box-shadow: inset 0 1px 0 rgba(0,200,255,.35);
  }

  /* ── ENTITIES TAB ── */
  .pve-wrap {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    padding: 12px 16px 14px;
    gap: 10px;
  }

  .pve-pills {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .pve-pill {
    padding: 5px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.05);
    color: rgba(255,255,255,.55);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
    outline: none;
    user-select: none;
  }

  .pve-pill:hover {
    background: rgba(0,200,255,.14);
    color: rgba(255,255,255,.85);
    border-color: rgba(0,200,255,.35);
  }

  .pve-pill-active {
    background: rgba(0,200,255,.20) !important;
    color: white !important;
    border-color: rgba(0,200,255,.50) !important;
    box-shadow: 0 0 8px rgba(0,200,255,.20);
  }

  .pve-subpanel {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    align-content: start;
  }

  .pve-group {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 14px;
    overflow: hidden;
  }

  .pve-input {
    width: 100%;
    margin-top: 3px;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid rgba(0,200,255,.22);
    background: rgba(0,0,0,.28);
    color: rgba(0,220,255,.88);
    font-size: 10px;
    font-family: monospace;
    outline: none;
    transition: border-color .12s, background .12s;
    pointer-events: all;
    min-width: 0;
  }

  .pve-input:focus {
    border-color: rgba(0,200,255,.55);
    background: rgba(0,200,255,.08);
  }

  .pve-note {
    font-size: 9px;
    font-family: monospace;
    color: rgba(255,202,40,.60);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pve-reset-btn {
    color: rgba(255,100,100,.80) !important;
    border-color: rgba(255,100,100,.30) !important;
    background: rgba(255,100,100,.08) !important;
  }

  .pve-save-btn {
    padding: 6px 18px;
    border-radius: 999px;
    border: 1px solid rgba(53,255,118,.45);
    background: rgba(53,255,118,.12);
    color: #35ff76;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  .pve-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,200,255,.25) transparent;
  }
  .pve-list::-webkit-scrollbar { width:4px; }
  .pve-list::-webkit-scrollbar-thumb { background:rgba(0,200,255,.25); border-radius:999px; }

  /* .pve-group merged into pve-wrap section */

  .pve-gtitle {
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: rgba(255,255,255,.70);
    padding: 8px 12px 6px;
    background: rgba(0,200,255,.06);
    border-bottom: 1px solid rgba(255,255,255,.08);
  }

  .pve-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }

  .pve-row:last-child { border-bottom: none; }

  .pve-row-info { display: flex; flex-direction: column; gap: 0; flex: 1; min-width: 0; overflow: hidden; }

  .pve-lbl {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,.88);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pve-eid {
    font-size: 9.5px;
    font-family: monospace;
    color: rgba(0,200,255,.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pve-ok {
    font-size: 11px;
    font-weight: 700;
    color: #35ff76;
    background: rgba(53,255,118,.10);
    border: 1px solid rgba(53,255,118,.28);
    border-radius: 6px;
    padding: 2px 7px;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .pve-miss {
    font-size: 11px;
    font-weight: 700;
    color: #ffca28;
    background: rgba(255,202,40,.10);
    border: 1px solid rgba(255,202,40,.28);
    border-radius: 6px;
    padding: 2px 7px;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .pve-reset-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(0,0,0,.18);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    flex-shrink: 0;
  }

  .pve-reset-note {
    font-size: 10px;
    color: rgba(255,255,255,.45);
    font-style: italic;
  }

  /* YAML panel (kept for possible future use) */
  .pve-yaml-wrap {
    display: none;
  }

  .pve-yaml-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(0,200,255,.07);
    border-bottom: 1px solid rgba(0,200,255,.14);
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    color: rgba(0,200,255,.85);
  }

  .pve-copy-btn {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    background: rgba(0,200,255,.14);
    border: 1px solid rgba(0,200,255,.35);
    color: rgba(0,200,255,.90);
    cursor: pointer;
    transition: background .12s;
    outline: none;
  }

  .pve-copy-btn:hover { background: rgba(0,200,255,.28); }

  .pve-yaml-pre {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    margin: 0;
    padding: 10px 12px;
    font-family: monospace;
    font-size: 9px;
    line-height: 1.55;
    color: rgba(255,255,255,.78);
    white-space: pre;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,200,255,.25) transparent;
  }

  .pve-yaml-pre::-webkit-scrollbar { width: 4px; }
  .pve-yaml-pre::-webkit-scrollbar-thumb { background: rgba(0,200,255,.25); border-radius:999px; }

  .pvs-body-entities {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex: 1;
    min-height: 0;
    padding: 0;
  }

  @container (max-width: 1200px) {
    .ecc-wrap { font-size: 85%; }
    .prod-line span { font-size: 38px; }
    .row-main { grid-template-columns: 1fr 1fr; }
    .decision { grid-column: 1 / -1; }
  }
