        var vraw = ok ? s.state : '';
        var uom = (ok && s.attributes && s.attributes.unit_of_measurement)
          ? ' ' + s.attributes.unit_of_measurement : (note ? ' ' + note : '');
        var vdisp = vraw.length > 11 ? vraw.substring(0, 11) + '..' : vraw;
