##############################################################
#
# HA Energy Suite
#
# File:
# monthly-report-sql.yaml
#
# Descrizione:
# Sensori SQL utilizzati dalla card "Monthly Report".
#
# Requisiti:
# - Integrazione SQL
# - Dashboard Energia configurata
#
# Licenza:
# MIT License
#
##############################################################

##############################################################
#
# CONFIGURAZIONE
#
# 1. Esegui:
#
# SELECT id, statistic_id
# FROM statistics_meta
# ORDER BY statistic_id;
#
# 2. Individua i metadata_id di:
#    - Produzione FV
#    - Consumo Casa
#    - Import Rete
#    - Export Rete
#
# 3. Sostituisci SOLO i metadata_id presenti
#    in questo file.
#
# Non modificare altro.
#
##############################################################

# ============================================================
# FOTOVOLTAICO - LONG TERM STATISTICS 2026
# File: /config/packages/fotovoltaico_long_term_statistics.yaml
# ============================================================
#
# Legge i dati storici reali dalla Dashboard Energia / Long Term Statistics
#
# metadata_id:
# 265 = sensor.inverter_total_production
# 274 = sensor.inverter_total_load_consumption
# 269 = sensor.inverter_total_energy_import
# 270 = sensor.inverter_total_energy_export
#
# ============================================================

sql:
  # =========================
  # GENNAIO 2026
  # =========================

  - name: FV 2026 01 Produzione DB
    unique_id: fv_2026_01_produzione_db
    db_url: sqlite:////config/home-assistant_v2.db
    query: >
      SELECT ROUND(COALESCE((SELECT sum FROM statistics WHERE metadata_id = 265 AND start_ts <= strftime('%s','2026-02-01 00:00:00','localtime') ORDER BY start_ts DESC LIMIT 1) - (SELECT sum FROM statistics WHERE metadata_id = 265 AND start_ts <= strftime('%s','2026-01-01 00:00:00','localtime') ORDER BY start_ts DESC LIMIT 1), 0), 2) AS value;
    column: value
    unit_of_measurement: "kWh"

